name: Deploy Single HTML to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 设置 GitHub Pages 运行环境
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 这一步会自动将根目录下的 index.html 打包为部署包
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目录下所有文件

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
